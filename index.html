<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chulengo Estudio — Stock</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F5F2ED;color:#1A1814;min-height:100vh}
.site-header{background:#1A1814;color:#fff;padding:1.5rem 2rem;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:baseline;gap:1rem;flex-wrap:wrap;margin-bottom:0.5rem}
.site-title{font-family:'DM Mono',monospace;font-size:1.25rem;font-weight:500}
.site-sub{font-size:0.8rem;color:#9CA3AF;font-family:'DM Mono',monospace}
.promo-pill{display:inline-flex;align-items:center;gap:6px;background:#1D4ED8;color:#fff;font-size:0.72rem;font-weight:500;padding:4px 12px;border-radius:20px}
.promo-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:#93C5FD;display:inline-block}
.filters-bar{background:#fff;border-bottom:1px solid #E2DDD6;padding:0.875rem 2rem;display:flex;gap:10px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#8A8479;pointer-events:none}
input[type=text]{width:100%;padding:8px 12px 8px 34px;border:1px solid #E2DDD6;border-radius:8px;font-size:0.85rem;font-family:'DM Sans',sans-serif;background:#F5F2ED;color:#1A1814;outline:none}
input[type=text]:focus{border-color:#2D6A4F}
select{padding:8px 12px;border:1px solid #E2DDD6;border-radius:8px;font-size:0.82rem;font-family:'DM Sans',sans-serif;background:#F5F2ED;color:#1A1814;cursor:pointer;outline:none}
select:focus{border-color:#2D6A4F}
.stats-bar{padding:0.6rem 2rem;display:flex;gap:1.25rem;font-size:0.78rem;color:#8A8479;font-family:'DM Mono',monospace;border-bottom:1px solid #E2DDD6;flex-wrap:wrap}
.stats-bar b{color:#1A1814}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;padding:1.5rem 2rem}
.card{background:#fff;border:1px solid #E2DDD6;border-radius:12px;padding:1rem;display:flex;flex-direction:column;gap:7px;transition:box-shadow 0.15s,transform 0.15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.07);transform:translateY(-1px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-title{font-size:0.82rem;font-weight:600;line-height:1.4;flex:1}
.badge{font-size:0.68rem;font-weight:500;padding:3px 8px;border-radius:20px;white-space:nowrap;font-family:'DM Mono',monospace}
.b-ok{background:#E8F5EE;color:#1B4332}
.b-low{background:#FEF3C7;color:#78350F}
.b-out{background:#FEE2E2;color:#7F1D1D}
.card-meta{font-size:0.76rem;color:#8A8479;line-height:1.6}
.card-meta b{color:#1A1814;font-weight:500}
.color-chip{display:inline-flex;align-items:center;gap:5px}
.cdot{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,0.12);flex-shrink:0}
.stock-line{font-family:'DM Mono',monospace;font-size:0.75rem;color:#8A8479}
.stock-line b{color:#1A1814}
.prices{border-top:1px solid #E2DDD6;padding-top:8px;margin-top:2px;display:flex;flex-direction:column;gap:4px}
.price-row{display:flex;justify-content:space-between;align-items:center}
.price-label{font-size:0.72rem;color:#8A8479;display:flex;align-items:center;gap:5px}
.ptag{font-size:0.65rem;background:#EFF6FF;color:#1E3A8A;padding:1px 6px;border-radius:10px;font-weight:500}
.price-val{font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:500;color:#1A1814}
.price-val.green{color:#2D6A4F}
.empty{grid-column:1/-1;text-align:center;padding:4rem;color:#8A8479;font-size:0.9rem}
.loading{text-align:center;padding:5rem 2rem;color:#8A8479}
.spinner{width:32px;height:32px;border:2px solid #E2DDD6;border-top-color:#2D6A4F;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:2rem;font-size:0.75rem;color:#8A8479;font-family:'DM Mono',monospace;border-top:1px solid #E2DDD6;margin-top:1rem}
@media(max-width:600px){
  .site-header,.filters-bar,.stats-bar,.grid{padding-left:1rem;padding-right:1rem}
  .grid{grid-template-columns:1fr 1fr;gap:8px}
}
@media(max-width:400px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <img src="CHULENGO%20LOGOO.png" alt="Chulengo Estudio" style="width:40px;height:40px;border-radius:8px">
    <span class="site-title">Chulengo Estudio</span>
    <span class="site-sub">stock de filamentos</span>
  </div>
  <div class="promo-pill">Precio oferta disponible comprando 2 kg o más</div>
</header>

<div class="filters-bar">
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Buscar por nombre, color, marca...">
  </div>
  <select id="fil-material"><option value="">Todos los materiales</option></select>
  <select id="fil-marca"><option value="">Todas las marcas</option></select>
  <select id="fil-stock">
    <option value="">Todo el stock</option>
    <option value="ok">Disponible</option>
    <option value="low">Poco stock</option>
    <option value="out">Sin stock</option>
  </select>
</div>

<div class="stats-bar" id="stats">
  <span>Cargando datos...</span>
</div>

<div id="content">
  <div class="loading"><div class="spinner"></div>Cargando stock...</div>
</div>

<footer>Precios en pesos argentinos · Actualizado automáticamente · Chulengo Estudio</footer>

<script>
const API = 'https://script.google.com/macros/s/AKfycbyQqTFKvy-Q6fSF7XZdgAMTbypeC3xMv08ACBLXnsKczgtD_tWQr9ZSkrifeEyufDPY/exec';

const COLORS = {
  'amarillo':'#FFD600','azul':'#1E88E5','blanco':'#EEEEEE','negro':'#212121',
  'verde':'#43A047','rojo':'#E53935','naranja':'#FB8C00','rosa':'#E91E63',
  'marron':'#6D4C41','marrón':'#6D4C41','violeta':'#8E24AA','gris':'#9E9E9E',
  'plateado':'#B0BEC5','dorado':'#FFA000','celeste':'#4FC3F7','turquesa':'#26C6DA'
};

let DATA = [];

function fmt(n){
  return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',maximumFractionDigits:0}).format(Number(n)||0);
}
function status(s){
  const n=parseInt(s)||0;
  return n<=0?'out':n<=3?'low':'ok';
}
function label(s){return{out:'Sin stock',low:'Poco stock',ok:'Disponible'}[status(s)];}
function cls(s){return{out:'b-out',low:'b-low',ok:'b-ok'}[status(s)];}
function dot(c){
  const h=COLORS[(c||'').toLowerCase()];
  return h?`<span class="cdot" style="background:${h}"></span>`:'';
}

function normalize(row){
  // build a clean lowercase key map
  const r={};
  Object.keys(row).forEach(k=>{r[k.toLowerCase().trim()]=(row[k]||'').trim();});
  return {
    marca:     r['marca nombre']    || r['marca']    || '',
    material:  r['material nombre'] || r['material'] || '',
    present:   r['presentacion nombre'] || r['presentacion'] || '',
    color:     r['color nombre']    || r['color']    || '',
    denom:     r['denominacion nombre'] || r['denominacion'] || '',
    lista:     r['precio_lista']    || '0',
    oferta:    r['precio_oferta']   || '0',
    stock:     r['stock']           || '0',
  };
}

function populateFilters(){
  const mats=[...new Set(DATA.map(d=>d.material).filter(Boolean))].sort();
  const marcas=[...new Set(DATA.map(d=>d.marca).filter(Boolean))].sort();
  const fm=document.getElementById('fil-material');
  const fb=document.getElementById('fil-marca');
  fm.innerHTML='<option value="">Todos los materiales</option>';
  fb.innerHTML='<option value="">Todas las marcas</option>';
  mats.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;fm.appendChild(o);});
  marcas.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;fb.appendChild(o);});
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const mat=document.getElementById('fil-material').value;
  const marca=document.getElementById('fil-marca').value;
  const stk=document.getElementById('fil-stock').value;

  const filtered=DATA.filter(d=>{
    if(q){
      const hay=d.denom.toLowerCase().includes(q)||
                d.color.toLowerCase().includes(q)||
                d.marca.toLowerCase().includes(q)||
                d.material.toLowerCase().includes(q);
      if(!hay)return false;
    }
    if(mat && d.material!==mat)return false;
    if(marca && d.marca!==marca)return false;
    if(stk && status(d.stock)!==stk)return false;
    return true;
  });

  const ok=filtered.filter(d=>status(d.stock)==='ok').length;
  const low=filtered.filter(d=>status(d.stock)==='low').length;
  const out=filtered.filter(d=>status(d.stock)==='out').length;

  document.getElementById('stats').innerHTML=
    `<span>Mostrando <b>${filtered.length}</b> productos</span>`+
    `<span><b>${ok}</b> disponibles</span>`+
    `<span><b>${low}</b> poco stock</span>`+
    `<span><b>${out}</b> sin stock</span>`;

  if(!filtered.length){
    document.getElementById('content').innerHTML='<div class="grid"><div class="empty">No se encontraron productos con esos filtros.</div></div>';
    return;
  }

  document.getElementById('content').innerHTML='<div class="grid">'+filtered.map(d=>{
    const lista=Number(d.lista)||0;
    const oferta=Number(d.oferta)||0;
    const hayOferta=oferta>0 && oferta!==lista;
    const stockN=parseInt(d.stock)||0;
    return `<div class="card">
      <div class="card-top">
        <div class="card-title">${d.material} · ${d.denom}</div>
        <span class="badge ${cls(d.stock)}">${label(d.stock)}</span>
      </div>
      <div class="card-meta">
        <b>${d.marca}</b> · ${d.present}<br>
        <span class="color-chip">${dot(d.color)}${d.color||'Sin color'}</span>
      </div>
      <div class="stock-line">Stock: <b>${stockN} u.</b></div>
      <div class="prices">
        <div class="price-row">
          <span class="price-label">Precio unitario</span>
          <span class="price-val">${fmt(lista)}</span>
        </div>
        ${hayOferta?`<div class="price-row">
          <span class="price-label">Oferta <span class="ptag">2 kg o más</span></span>
          <span class="price-val green">${fmt(oferta)}</span>
        </div>`:''}
      </div>
    </div>`;
  }).join('')+'</div>';
}

async function load(){
  try{
    const r=await fetch(API);
    if(!r.ok) throw new Error('error');
    const json=await r.json();
    DATA=json.map(normalize).filter(d=>d.material||d.denom);
    populateFilters();
    render();
    ['search','fil-material','fil-marca','fil-stock'].forEach(id=>{
      document.getElementById(id).addEventListener('input',render);
    });
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading">No se pudieron cargar los datos. Intentá recargar la página.</div>';
    document.getElementById('stats').innerHTML='<span>Error al cargar</span>';
  }
}

load();
</script>
</body>
</html>
